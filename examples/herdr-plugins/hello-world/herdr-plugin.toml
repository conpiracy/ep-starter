id = "example.hello-world"
name = "Hello World"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Minimal Herdr plugin — actions, env vars, and calling back into Herdr"
platforms = ["linux", "macos", "windows"]

[[build]]
command = ["chmod", "+x", "greet.sh"]

[[actions]]
id = "greet"
title = "Say Hello"
contexts = ["workspace", "tab"]
command = ["bash", "greet.sh"]

[[actions]]
id = "pane-status"
title = "Pane Status"
contexts = ["workspace"]
command = ["bash", "pane-status.sh"]
