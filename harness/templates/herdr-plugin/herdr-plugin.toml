# ──────────────────────────────────────────────────────────
# Herdr Plugin Manifest
# ──────────────────────────────────────────────────────────
# Create a new Herdr plugin by copying this template:
#   cp -r harness/templates/herdr-plugin/ my-plugin/
#   cd my-plugin
#   # Edit herdr-plugin.toml and create your scripts
#   herdr plugin link .
#
# Docs: https://herdr.dev/docs/plugins/
# ──────────────────────────────────────────────────────────

id = "your-name.plugin-name"       # Required: dot-separated, globally unique
name = "Plugin Name"                # Required: human-readable
version = "0.1.0"                   # Required: semver
min_herdr_version = "0.7.0"        # Required: oldest compatible Herdr version
description = "What this plugin does"  # Recommended
platforms = ["linux", "macos", "windows"]  # Optional

# ── Build Commands ───────────────────────────────────────
# Run during `herdr plugin install` from GitHub (not on `plugin link`)
# [[build]]
# command = ["npm", "ci"]
#
# [[build]]
# command = ["npm", "run", "build"]
# platforms = ["linux", "macos"]

# ── Actions (menu-invokable) ─────────────────────────────
[[actions]]
id = "my-action"
title = "My Action 👋"
contexts = ["workspace", "tab"]
command = ["bash", "scripts/my-action.sh"]

# [[actions]]
# id = "another-action"
# title = "Another Action"
# contexts = ["global"]
# command = ["node", "index.js"]

