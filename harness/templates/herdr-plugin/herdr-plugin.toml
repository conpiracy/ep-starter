# Herdr Plugin Manifest
#
# Copy this template:
#   cp -r harness/templates/herdr-plugin/ my-plugin/
#   cd my-plugin
#   # edit herdr-plugin.toml and scripts
#   herdr plugin link .
#
# Docs: https://herdr.dev/docs/plugins/

id = "your-name.plugin-name"
name = "Plugin Name"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "What this plugin does"
platforms = ["linux", "macos", "windows"]

# Build commands (GitHub install only; not on plugin link)
# [[build]]
# command = ["npm", "ci"]
#
# [[build]]
# command = ["npm", "run", "build"]
# platforms = ["linux", "macos"]

[[actions]]
id = "my-action"
title = "My Action"
contexts = ["workspace", "tab"]
command = ["bash", "scripts/my-action.sh"]

